<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pusulabet Penaltı ⚽</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#1a4a20;overflow:hidden;height:100dvh;width:100vw;font-family:'Rajdhani',sans-serif;touch-action:manipulation;user-select:none;}
#wrap{position:relative;width:100vw;height:100dvh;}
#c{display:block;width:100vw;height:100dvh;touch-action:none;}
#fx{position:absolute;inset:0;pointer-events:none;z-index:5;}
#ui{position:fixed;inset:0;pointer-events:none;z-index:10;}
#hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;padding:14px 20px 0;background:linear-gradient(to bottom,rgba(0,0,0,0.75),transparent);}
.hb{text-align:center;}
.hl{font-family:'Bebas Neue',cursive;font-size:11px;letter-spacing:2.5px;color:rgba(255,255,255,0.45);display:block;}
.hv{font-family:'Bebas Neue',cursive;font-size:40px;line-height:1;color:#FFD700;text-shadow:0 0 20px rgba(255,215,0,.7);}
.hv.g{color:#00E676;text-shadow:0 0 20px rgba(0,230,118,.7);}
.hv.r{color:#FF1744;text-shadow:0 0 20px rgba(255,23,68,.7);}
#dots{position:absolute;bottom:22%;left:50%;transform:translateX(-50%);display:flex;gap:10px;}
.dot{width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,.3);background:transparent;transition:all .35s;}
.dot.goal{background:#00E676;border-color:#00E676;box-shadow:0 0 12px #00E676;}
.dot.miss{background:#FF1744;border-color:#FF1744;box-shadow:0 0 12px #FF1744;}
#banner{position:absolute;bottom:12%;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,rgba(255,107,0,.97),rgba(200,15,0,.97));color:#fff;font-family:'Bebas Neue',cursive;font-size:clamp(14px,3.8vw,20px);letter-spacing:2px;padding:11px 28px;border-radius:50px;border:1px solid rgba(255,255,255,.2);box-shadow:0 4px 24px rgba(255,107,0,.55);white-space:nowrap;animation:pulse 1.6s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:translateX(-50%) scale(1)}50%{transform:translateX(-50%) scale(1.04)}}
#result{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;opacity:0;pointer-events:none;transition:opacity .3s;}
#result.show{opacity:1;}
.rbg{position:absolute;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(5px);}
.remoji{font-size:80px;position:relative;z-index:1;animation:bIn .45s cubic-bezier(.36,.07,.19,.97);}
@keyframes bIn{0%{transform:scale(.1);opacity:0}55%{transform:scale(1.25)}100%{transform:scale(1);opacity:1}}
.rtxt{font-family:'Bebas Neue',cursive;font-size:clamp(40px,10vw,64px);letter-spacing:5px;position:relative;z-index:1;text-shadow:0 4px 24px rgba(0,0,0,.9);}
.rtxt.gt{color:#00E676;}.rtxt.mt{color:#FF1744;}
.rsub{font-size:18px;color:rgba(255,255,255,.82);position:relative;z-index:1;letter-spacing:1px;}
#final{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;}
#final.show{display:flex;}
.fbg{position:absolute;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(12px);}
.fcard{position:relative;z-index:1;background:linear-gradient(145deg,rgba(255,107,0,.1),rgba(0,0,0,.7));border:1px solid rgba(255,215,0,.28);border-radius:24px;padding:32px 40px;text-align:center;max-width:320px;width:88%;}
.ftrophy{font-size:66px;margin-bottom:6px;}
.ftitle{font-family:'Bebas Neue',cursive;font-size:48px;letter-spacing:3px;margin-bottom:4px;}
.fscore{font-family:'Bebas Neue',cursive;font-size:32px;color:#FFD700;margin-bottom:10px;}
.fmsg{font-size:15px;color:rgba(255,255,255,.7);line-height:1.55;margin-bottom:20px;}
.btnP{background:linear-gradient(135deg,#FF6B00,#e02000);color:#fff;font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:2px;padding:14px 36px;border:none;border-radius:50px;cursor:pointer;width:100%;pointer-events:all;transition:transform .14s;}
.btnP:active{transform:scale(.97);}
.btnS{background:transparent;color:rgba(255,255,255,.5);font-size:14px;border:1px solid rgba(255,255,255,.15);border-radius:50px;padding:10px 28px;cursor:pointer;width:100%;margin-top:8px;pointer-events:all;}
#start{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:48px;}
.sbg{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.92) 0%,rgba(0,0,0,.15) 55%,transparent 100%);pointer-events:none;}
.scard{position:relative;z-index:1;text-align:center;width:90%;max-width:340px;}
.sbrand{font-family:'Bebas Neue',cursive;font-size:12px;letter-spacing:6px;color:#FF6B00;margin-bottom:4px;}
.stitle{font-family:'Bebas Neue',cursive;font-size:64px;color:#fff;line-height:.9;letter-spacing:2px;text-shadow:0 4px 32px rgba(0,0,0,.9);margin-bottom:10px;}
.stitle span{color:#FFD700;}
.sdesc{font-size:15px;color:rgba(255,255,255,.65);margin-bottom:22px;line-height:1.5;}
.srules{display:flex;justify-content:center;gap:28px;margin-bottom:24px;}
.ri{text-align:center;}.ric{font-size:26px;}.rit{font-size:12px;color:rgba(255,255,255,.48);display:block;margin-top:3px;}
</style>
</head>
<body>
<div id="wrap">
<canvas id="c"></canvas>
<canvas id="fx"></canvas>
</div>
<div id="ui">
  <div id="hud">
    <div class="hb"><span class="hl">GOL</span><div class="hv g" id="sGoal">0</div></div>
    <div class="hb"><span class="hl">KALAN</span><div class="hv" id="sRemain">5</div></div>
    <div class="hb"><span class="hl">KAÇTI</span><div class="hv r" id="sMiss">0</div></div>
  </div>
  <div id="dots"></div>
  <div id="banner">⚽ KALEYE DOKUN — HEDEF SEC!</div>
  <div id="result">
    <div class="rbg"></div>
    <div class="remoji" id="rEmoji">⚽</div>
    <div class="rtxt" id="rTxt">GOL!</div>
    <div class="rsub" id="rSub"></div>
  </div>
  <div id="final">
    <div class="fbg"></div>
    <div class="fcard">
      <div class="ftrophy" id="fTrophy">🏆</div>
      <div class="ftitle" id="fTitle">TEBRIKLER!</div>
      <div class="fscore" id="fScore">5/5 GOL</div>
      <div class="fmsg" id="fMsg">Mukemmel!</div>
      <button class="btnP" onclick="resetGame()">🔄 TEKRAR OYNA</button>
      <button class="btnS" onclick="shareResult()">📤 Skoru Paylas</button>
    </div>
  </div>
  <div id="start">
    <div class="sbg"></div>
    <div class="scard">
      <div class="sbrand">PUSULABET</div>
      <div class="stitle">PENALTI<br><span>SUTLARI</span></div>
      <div class="sdesc">Arda Guler — kaleye dokun, kose sec.</div>
      <div class="srules">
        <div class="ri"><div class="ric">⚽</div><span class="rit">5 Atis</span></div>
        <div class="ri"><div class="ric">🥅</div><span class="rit">9 Kose</span></div>
        <div class="ri"><div class="ric">✨</div><span class="rit">Sprite</span></div>
      </div>
      <button type="button" class="btnP" id="btnStart" style="font-size:26px;padding:16px;pointer-events:all;">⚽ BASLAT</button>
    </div>
  </div>
</div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';

/** HTML dosyasinin bulundugu klasore gore assets/ — GitHub Pages (alt yol) guvenli */
function resolveAsset(relPath){
  const baseDir=new URL('.', import.meta.url).href;
  return new URL(relPath, baseDir).href;
}

// —— Asset / sprite config ——
const CFG = {
  ASSETS: {
    bg: resolveAsset('assets/bg.png'),
    ball: resolveAsset('assets/ball.png'),
    player: resolveAsset('assets/arda.png'),
    keeper: resolveAsset('assets/keeper.png'),
  },
  playerFrameWidth: 256,
  playerFrameHeight: 384,
  playerFrameCount: 4,
  keeperFrameWidth: 320,
  keeperFrameHeight: 384,
  keeperFrameCount: 5,
};

/**
 * Yatay sprite sheet: tek satir, repeat.x = 1/n, offset.x = i/n
 * UV inset: texture.userData.framePxW ayarlıysa, her kare kenarından
 * 0.5 texel içeri çekilir → doğrusal örneklemeden kaynaklanan
 * komşu-kare taşması (bleeding) engellenir.
 */
function applySpriteFrame(texture, frameIndex, frameCount){
  const i=Math.max(0,Math.min(frameCount-1,frameIndex|0));
  texture.wrapS=THREE.ClampToEdgeWrapping;
  texture.wrapT=THREE.ClampToEdgeWrapping;
  // eps = 0.5 piksel / toplam sheet genişliği (UV birimi)
  const fpw=texture.userData?.framePxW||0;
  const eps=fpw ? 0.5/(fpw*frameCount) : 0;
  texture.repeat.set(1/frameCount - 2*eps, 1);
  texture.offset.set(i/frameCount + eps, 0);
  texture.needsUpdate=true;
}

function prepareSheetTexture(tex){
  tex.colorSpace=THREE.SRGBColorSpace;
  tex.minFilter=THREE.LinearMipmapLinearFilter;
  tex.magFilter=THREE.LinearFilter;
  tex.generateMipmaps=true;
}

/** Tek TextureLoader — tum asset yuklemeleri */
const textureLoader=new THREE.TextureLoader();
textureLoader.setCrossOrigin('anonymous');

let tg=null;
try{tg=window.Telegram?.WebApp;if(tg){tg.ready();tg.expand();tg.setHeaderColor('#061208');}}catch(e){}

const canvas=document.getElementById('c');
const fx=document.getElementById('fx');
const fctx=fx.getContext('2d');

let W=innerWidth,H=innerHeight;
let renderer, camera;

function size(){
  W=innerWidth; H=innerHeight;
  canvas.width=W; canvas.height=H;
  fx.width=W; fx.height=H;
  if(renderer) renderer.setSize(W,H,false);
  if(camera) camera.aspect=W/H, camera.updateProjectionMatrix();
}
addEventListener('resize',size);

const DIST=11;
const GW=7.32, GH=2.44;
const GZ=-DIST;
const BALL_R=0.11;

const scene=new THREE.Scene();
// background null → renderer canvas alpha ile body CSS'i göster (bg yüklenene kadar)
// bg.png yüklenince plane tam ekranı kaplar
scene.background=null;
scene.fog=null; // fog kaldırıldı → keeper ve kale net görünsün

// FOV=38° (biraz dar → daha az distorsiyon, daha sinematik)
// Kamera ceza noktasının biraz arkasında ve alçakta
// lookAt: kale orta-üstüne bakıyor
camera=new THREE.PerspectiveCamera(38,W/H,0.1,200);
camera.position.set(0,0.85,5.5);
camera.lookAt(0,1.5,GZ);

// alpha:true → scene.background=null ile bg.png plane'e geçiş görünmez
renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true,powerPreference:'high-performance'});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(W,H,false);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.outputColorSpace=THREE.SRGBColorSpace;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.05;

// Ambient biraz daha yüksek → top ve zemin daha parlak
const amb=new THREE.AmbientLight(0xffffff,0.75);
scene.add(amb);
const sun=new THREE.DirectionalLight(0xfff5e6,1.0);
sun.position.set(-8,22,12);
sun.castShadow=true;
sun.shadow.mapSize.set(2048,2048);
sun.shadow.camera.near=1; sun.shadow.camera.far=60;
sun.shadow.camera.left=-25; sun.shadow.camera.right=25;
sun.shadow.camera.top=25; sun.shadow.camera.bottom=-25;
scene.add(sun);
const fill=new THREE.DirectionalLight(0xaaccff,0.22);
fill.position.set(10,8,-5);
scene.add(fill);

// —— Yer ——
// Transparan → bg.png tüm ekranı kaplar, 3D ground renk geçişi yok
// receiveShadow:true korunuyor (top gölgesi çalışmaya devam eder)
const ground=new THREE.Mesh(
  new THREE.PlaneGeometry(120,120),
  new THREE.MeshStandardMaterial({
    color:0x3d7228,roughness:0.9,metalness:0,
    transparent:true,opacity:0.0,
    depthWrite:false
  })
);
ground.rotation.x=-Math.PI/2;
ground.receiveShadow=true;
scene.add(ground);

const lineMat=new THREE.MeshBasicMaterial({color:0xffffff});
const spot=new THREE.Mesh(new THREE.CircleGeometry(0.22,32),lineMat);
spot.rotation.x=-Math.PI/2;
spot.position.set(0,0.02,0);
scene.add(spot);
const pa=new THREE.Mesh(new THREE.PlaneGeometry(9.15,0.12),lineMat);
pa.rotation.x=-Math.PI/2;
pa.position.set(0,0.02,-5.5);
scene.add(pa);

// 3D kale direkleri ve file KALDIRILDI — bg.png zaten gerçek kale içeriyor.
// Çift kale efekti engellendi. goalPlane + hiGroup hücre tespiti için korunuyor.

const goalPlane=new THREE.Plane(new THREE.Vector3(0,0,1),-GZ);
const raycaster=new THREE.Raycaster();
const ndc=new THREE.Vector2();
const hitPt=new THREE.Vector3();
const camPos=new THREE.Vector3();

function worldFromCell(row,col){
  const cw=GW/3, ch=GH/3;
  const x=-GW/2+cw*(col+0.5);
  const y=ch*((2-row)+0.5);
  return new THREE.Vector3(x,y,GZ+0.02);
}

let hoverCell={r:-1,c:-1};
const hiGroup=new THREE.Group();
scene.add(hiGroup);
function buildHiMeshes(){
  while(hiGroup.children.length) hiGroup.remove(hiGroup.children[0]);
  const cw=GW/3, ch=GH/3;
  const mat=new THREE.MeshBasicMaterial({color:0xffd700,transparent:true,opacity:0,depthWrite:false});
  for(let r=0;r<3;r++) for(let c=0;c<3;c++){
    const m=new THREE.Mesh(new THREE.PlaneGeometry(cw-0.12,ch-0.12),mat.clone());
    m.position.set(-GW/2+cw*(c+0.5),ch*(2-r)+ch/2,GZ+0.04);
    m.userData={r,c};
    hiGroup.add(m);
  }
}
buildHiMeshes();
const hiMeshes=hiGroup.children;

// —— Referanslar (yukleme sonrasi dolar) ——
let ballMesh, playerRoot, playerMat, playerTex;
let keeperRoot, keeperMat, keeperTex;
let bgMesh;

// Player: 1.78→1.18 (%34 küçük) — kale görünür, keeper seçilir
// mesafe=4.95m, FOV=38° → ekranın ~%34'ü dikey
const PLAYER_WorldH=1.18;
const PLAYER_WorldW=PLAYER_WorldH*(CFG.playerFrameWidth/CFG.playerFrameHeight);
// Keeper: 1.72→2.55 (%48 büyük) — 16.15m uzakta, ekranın ~%23'ü (kale üstüne biraz taşar, görünürlük ↑)
const KEEPER_WorldH=2.55;
const KEEPER_WorldW=KEEPER_WorldH*(CFG.keeperFrameWidth/CFG.keeperFrameHeight);

function easeOutCubic(t){return 1-Math.pow(1-t,3);}
function easeInOut(t){return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}

/**
 * Kaleci frame: 0 idle, 1 dive_left, 2 dive_right, 3 jump_up_left, 4 jump_up_right
 * AI side + sut bolgesine gore (gerekirse 1/2 swap)
 */
function pickKeeperSpriteFrame(side, row, col){
  if(row===0){
    if(col===0) return 3;
    if(col===2) return 4;
    return Math.random()<0.5?3:4;
  }
  if(side==='left') return 1;
  if(side==='right') return 2;
  return Math.random()<0.5?1:2;
}

/** Oyuncu: idle(0) run(1) prep(2) kick(3) */
let playerAnim={phase:'idle',t:0};

let kState={phase:'idle',t:0,sx:0,tx:0,srot:0,trot:0,diveFrame:0};

let ballAnim={active:false,t:0,dur:0.62,p0:null,p1:null,p2:null};

const TOTAL=5;
const GMSG=["Net kose! 🔥","Tam isabet! ✨","Harika sut! 💥","Ust kose! 🎯","Gecilmez! ⚡","Aglari salladi! 🌊"];
const MMSG=["Kaleci tuttu! 🧤","Az kaldi! 😅","Direkce carpti!","Kacti! 😬","Kaleci sezdi! 👀","Kurtaris! 🙌"];
const COLORS=['#FFD700','#FF6B00','#00E676','#FF1744','#00BCD4','#E91E63','#fff'];

let goals=0,misses=0,shots=0,gameActive=false,canShoot=true;
let particles=[],confetti=[];
let assetsReady=false;

function startGame(){
  const st=document.getElementById('start');
  if(st) st.style.display='none';
  gameActive=true;
  canShoot=true;
}
window.startGame=startGame;
document.getElementById('btnStart')?.addEventListener('click',(e)=>{ e.preventDefault(); startGame(); });

function setHiOpacity(r,c,op){
  hiMeshes.forEach(m=>{
    const u=m.userData;
    m.material.opacity=(r>=0&&u.r===r&&u.c===c)?op:0;
  });
}

function updateHover(clientX,clientY){
  if(!gameActive||!canShoot){ setHiOpacity(-1,-1,0); return; }
  ndc.x=(clientX/W)*2-1;
  ndc.y=-(clientY/H)*2+1;
  raycaster.setFromCamera(ndc,camera);
  if(!raycaster.ray.intersectPlane(goalPlane,hitPt)){ setHiOpacity(-1,-1,0); hoverCell={r:-1,c:-1}; return; }
  if(hitPt.x<-GW/2||hitPt.x>GW/2||hitPt.y<0||hitPt.y>GH){ setHiOpacity(-1,-1,0); hoverCell={r:-1,c:-1}; return; }
  const cw=GW/3, ch=GH/3;
  const c=Math.min(2,Math.max(0,Math.floor((hitPt.x+GW/2)/cw)));
  const r=2-Math.min(2,Math.max(0,Math.floor(hitPt.y/ch)));
  hoverCell={r,c};
  setHiOpacity(r,c,0.28);
}

function billboardSprite(group){
  camera.getWorldPosition(camPos);
  group.lookAt(camPos.x,group.position.y,camPos.z);
}

function shoot(row,col){
  if(!assetsReady||!ballMesh||!canShoot||!gameActive)return;
  canShoot=false;
  document.getElementById('banner').style.display='none';
  setHiOpacity(-1,-1,0);

  const target=worldFromCell(row,col);
  const rand=Math.random();
  let side;
  if(col===0)      side=rand<0.5?'left':(rand<0.75?'center':'right');
  else if(col===2) side=rand<0.5?'right':(rand<0.75?'center':'left');
  else             side=rand<0.33?'left':(rand<0.66?'center':'right');

  const diveFrame=pickKeeperSpriteFrame(side,row,col);
  const sideX={left:keeperRoot.position.x-GW*0.18, center:keeperRoot.position.x, right:keeperRoot.position.x+GW*0.18};
  const lean=(side==='left'?0.85:(side==='right'?-0.85:(Math.random()<0.5?0.5:-0.5)));

  // saved hesabı kState'ten önce yapılıyor → animasyona geçiliyor
  const colMap={0:'left',1:'center',2:'right'};
  let saved=false;
  if(side===colMap[col]){
    if(row===0&&col!==1) saved=Math.random()<0.2;
    else if(row===0)     saved=Math.random()<0.3;
    else                 saved=Math.random()<0.58;
  } else saved=Math.random()<0.04;

  kState={
    phase:'dive',t:0,
    sx:keeperRoot.position.x,tx:sideX[side],
    srot:keeperRoot.rotation.z,trot:lean,
    diveFrame, saved,
  };
  applySpriteFrame(keeperTex,diveFrame,CFG.keeperFrameCount);

  playerAnim={phase:'run',t:0};

  const p0=ballMesh.position.clone();
  const p2=new THREE.Vector3(target.x,target.y,target.z);
  const mid=new THREE.Vector3().addVectors(p0,p2).multiplyScalar(0.5);
  mid.y+=2.05+Math.random()*0.35;
  ballAnim={active:true,t:0,dur:0.58,p0,p1:mid,p2};

  setTimeout(()=>onLand(saved,target),560);
}

function onLand(saved,worldTarget){
  shots++;
  const dot=document.getElementById('dot-'+(shots-1));
  const wvec=worldTarget.clone();
  wvec.project(camera);
  const px=(wvec.x*0.5+0.5)*W, py=(-wvec.y*0.5+0.5)*H;

  if(!saved){
    goals++;document.getElementById('sGoal').textContent=goals;
    if(dot)dot.classList.add('goal');
    spawnParts(px,py); spawnConfetti(px,py-H*0.06);
    showResult(true);
  } else {
    misses++;document.getElementById('sMiss').textContent=misses;
    if(dot)dot.classList.add('miss');
    showResult(false);
  }
  document.getElementById('sRemain').textContent=TOTAL-shots;
}

function showResult(isGoal){
  const ov=document.getElementById('result');
  document.getElementById('rEmoji').textContent=isGoal?'⚽':'🧤';
  const rt=document.getElementById('rTxt');
  rt.textContent=isGoal?'GOL!':'TUTUDU!';
  rt.className='rtxt '+(isGoal?'gt':'mt');
  document.getElementById('rSub').textContent=(isGoal?GMSG:MMSG)[Math.floor(Math.random()*(isGoal?GMSG:MMSG).length)];
  ov.classList.add('show');
  setTimeout(()=>{
    ov.classList.remove('show');
    if(!assetsReady)return;
    ballMesh.position.set(0,BALL_R,0);
    ballAnim.active=false;
    playerRoot.position.set(0,0,0.55);
    playerRoot.rotation.set(0,0,0);
    playerAnim={phase:'idle',t:0};
    applySpriteFrame(playerTex,0,CFG.playerFrameCount);
    kState={phase:'return',t:0,sx:keeperRoot.position.x,srot:keeperRoot.rotation.z,diveFrame:kState.diveFrame};
  },1600);
}

function resetRoundVisuals(){
  if(!assetsReady)return;
  ballMesh.position.set(0,BALL_R,0);
  ballMesh.scale.setScalar(1);
  ballAnim.active=false;
  playerRoot.position.set(0,0,0.55);
  playerRoot.rotation.set(0,0,0);
  playerAnim={phase:'idle',t:0};
  applySpriteFrame(playerTex,0,CFG.playerFrameCount);
}

function resetPositions(){
  resetRoundVisuals();
  keeperRoot.position.set(0,KEEPER_WorldH/2,GZ+0.35);
  keeperRoot.rotation.set(0,0,0);
  applySpriteFrame(keeperTex,0,CFG.keeperFrameCount);
  kState={phase:'idle',t:0,sx:0,tx:0,srot:0,trot:0,diveFrame:0};
}

function showFinal(){
  const pct=goals/TOTAL;
  const t=document.getElementById('fTrophy'),ti=document.getElementById('fTitle'),m=document.getElementById('fMsg');
  document.getElementById('fScore').textContent=goals+'/'+TOTAL+' GOL';
  if(pct===1){t.textContent='🏆';ti.textContent='MUKEMMEL!';ti.style.color='#FFD700';m.textContent='Tum penaltilari gol yaptin!';}
  else if(pct>=0.8){t.textContent='🥇';ti.textContent='HARIKA!';ti.style.color='#FFD700';m.textContent='Cok iyi!';}
  else if(pct>=0.6){t.textContent='⭐';ti.textContent='IYI!';ti.style.color='#4FC3F7';m.textContent='Guzel oyun!';}
  else if(pct>=0.4){t.textContent='💪';ti.textContent='DEVAM ET!';ti.style.color='#FF9800';m.textContent='Rovans ver!';}
  else{t.textContent='😅';ti.textContent='OLMADI!';ti.style.color='#FF5252';m.textContent='Bu sefer kaleci kazandi!';}
  document.getElementById('final').classList.add('show');
  gameActive=false;
  spawnConfetti(W/2,H*0.35);
  if(tg){try{tg.sendData(JSON.stringify({game:'penalti',goals,misses,total:TOTAL}));}catch(e){}}
}

function resetGame(){
  if(!assetsReady)return;
  goals=0;misses=0;shots=0;canShoot=true;gameActive=true;
  document.getElementById('sGoal').textContent='0';
  document.getElementById('sMiss').textContent='0';
  document.getElementById('sRemain').textContent=TOTAL;
  document.getElementById('final').classList.remove('show');
  document.getElementById('banner').style.display='';
  particles=[];confetti=[];
  buildDots();resetPositions();
}

window.resetGame=resetGame;
window.shareResult=function(){
  const txt='Pusulabet Penalti: '+goals+'/'+TOTAL+' gol! @pusulasocial';
  if(tg&&tg.openTelegramLink)tg.openTelegramLink('https://t.me/share/url?url=https://t.me/pusulabetgame_bot/penalti&text='+encodeURIComponent(txt));
  else if(navigator.share)navigator.share({text:txt});
};

function buildDots(){
  const cont=document.getElementById('dots');cont.innerHTML='';
  for(let i=0;i<TOTAL;i++){const d=document.createElement('div');d.className='dot';d.id='dot-'+i;cont.appendChild(d);}
}

function spawnParts(cx,cy){
  for(let i=0;i<32;i++){
    const a=Math.random()*Math.PI*2,s=1.5+Math.random()*5;
    particles.push({x:cx,y:cy,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:1,decay:0.02+Math.random()*0.02,r:2+Math.random()*5,col:Math.random()<0.5?'#00E676':'#FFD700'});
  }
}
function spawnConfetti(cx,cy){
  for(let i=0;i<70;i++){
    const a=(Math.random()-0.5)*Math.PI*1.5-Math.PI/2,s=4+Math.random()*11;
    confetti.push({x:cx,y:cy,vx:Math.cos(a)*s+(Math.random()-0.5)*4,vy:Math.sin(a)*s,w:4+Math.random()*8,h:3+Math.random()*5,rot:Math.random()*Math.PI*2,rotV:(Math.random()-0.5)*0.35,life:1,decay:0.008+Math.random()*0.008,col:COLORS[Math.floor(Math.random()*COLORS.length)]});
  }
}

function drawFx(){
  fctx.clearRect(0,0,W,H);
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.18;p.life-=p.decay;
    if(p.life<=0){particles.splice(i,1);continue;}
    fctx.globalAlpha=p.life;fctx.fillStyle=p.col;fctx.beginPath();fctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);fctx.fill();
  }
  for(let i=confetti.length-1;i>=0;i--){
    const c=confetti[i];c.x+=c.vx;c.y+=c.vy;c.vy+=0.28;c.vx*=0.99;c.rot+=c.rotV;c.life-=c.decay;
    if(c.life<=0){confetti.splice(i,1);continue;}
    fctx.save();fctx.globalAlpha=c.life;fctx.translate(c.x,c.y);fctx.rotate(c.rot);fctx.fillStyle=c.col;fctx.fillRect(-c.w/2,-c.h/2,c.w,c.h);fctx.restore();
  }
  fctx.globalAlpha=1;
}

canvas.addEventListener('mousemove',e=>{ if(gameActive&&canShoot) updateHover(e.clientX,e.clientY); });
canvas.addEventListener('click',e=>{
  if(!gameActive||!canShoot)return;
  updateHover(e.clientX,e.clientY);
  if(hoverCell.r>=0) shoot(hoverCell.r,hoverCell.c);
});
canvas.addEventListener('touchstart',e=>{
  if(!gameActive||!canShoot)return;
  const t=e.touches[0];
  updateHover(t.clientX,t.clientY);
  if(hoverCell.r>=0){ e.preventDefault(); shoot(hoverCell.r,hoverCell.c); }
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  if(!gameActive||!canShoot)return;
  updateHover(e.touches[0].clientX,e.touches[0].clientY);
},{passive:true});

let lastT=0;
function loop(ts){
  const dt=Math.min((ts-lastT)/1000,0.05); lastT=ts;

  if(!assetsReady){
    renderer.render(scene,camera);
    drawFx();
    requestAnimationFrame(loop);
    return;
  }

  if(ballAnim.active){
    ballAnim.t+=dt;
    const u=Math.min(ballAnim.t/ballAnim.dur,1);
    const e=easeInOut(u);
    const p0=ballAnim.p0,p1=ballAnim.p1,p2=ballAnim.p2;
    ballMesh.position.x=(1-e)*(1-e)*p0.x+2*(1-e)*e*p1.x+e*e*p2.x;
    ballMesh.position.y=(1-e)*(1-e)*p0.y+2*(1-e)*e*p1.y+e*e*p2.y;
    ballMesh.position.z=(1-e)*(1-e)*p0.z+2*(1-e)*e*p1.z+e*e*p2.z;
    ballMesh.rotation.x+=14*dt;
    ballMesh.rotation.z+=10*dt;
    if(u>=1){ ballAnim.active=false; ballMesh.scale.setScalar(1); }
  }

  if(playerAnim.phase==='run'){
    playerAnim.t+=dt;
    applySpriteFrame(playerTex,1,CFG.playerFrameCount);
    if(playerAnim.t>0.28){ playerAnim.phase='prep'; playerAnim.t=0; }
  } else if(playerAnim.phase==='prep'){
    playerAnim.t+=dt;
    applySpriteFrame(playerTex,2,CFG.playerFrameCount);
    if(playerAnim.t>0.14){ playerAnim.phase='kick'; playerAnim.t=0; }
  } else if(playerAnim.phase==='kick'){
    playerAnim.t+=dt;
    applySpriteFrame(playerTex,3,CFG.playerFrameCount);
    if(playerAnim.t>0.22){
      playerAnim.phase='idle';
      applySpriteFrame(playerTex,0,CFG.playerFrameCount);
    }
  } else {
    applySpriteFrame(playerTex,0,CFG.playerFrameCount);
  }

  if(kState.phase==='dive'){
    kState.t+=dt;
    const T=0.42;
    const u=Math.min(kState.t/T,1);
    const e=easeOutCubic(u);
    keeperRoot.position.x=kState.sx+(kState.tx-kState.sx)*e;
    // Kurtarışta daha sert eğim (kol tam uzanmış), kaçışta biraz daha az
    const leanScale=kState.saved?1.25:0.85;
    keeperRoot.rotation.z=kState.srot+(kState.trot*leanScale-kState.srot)*e;
    keeperRoot.position.y=KEEPER_WorldH/2+Math.sin(u*Math.PI)*0.38*e;
    applySpriteFrame(keeperTex,kState.diveFrame,CFG.keeperFrameCount);
    if(u>=1) kState.phase='hold';
  } else if(kState.phase==='hold'){
    kState.t+=dt;
    if(kState.saved){
      // Kurtarış: sert eğimde sabit dur — elin uzandığı belli olsun
      keeperRoot.position.y=KEEPER_WorldH/2+0.12;
    } else {
      // Kaçış: yavaşça yere sürünür gibi dibe iner
      const sag=Math.min(kState.t/0.4,1);
      keeperRoot.position.y=KEEPER_WorldH/2+0.38*(1-sag)-0.08*sag;
      keeperRoot.rotation.z=kState.trot*(1-sag*0.3);
    }
    applySpriteFrame(keeperTex,kState.diveFrame,CFG.keeperFrameCount);
  } else if(kState.phase==='return'){
    kState.t+=dt;
    const T=0.52;
    const u=Math.min(kState.t/T,1);
    const e=easeInOut(u);
    keeperRoot.position.x=kState.sx*(1-e);
    keeperRoot.rotation.z=kState.srot*(1-e);
    keeperRoot.position.y=KEEPER_WorldH/2;
    applySpriteFrame(keeperTex,0,CFG.keeperFrameCount);
    if(u>=1){
      kState.phase='idle';
      keeperRoot.position.set(0,KEEPER_WorldH/2,GZ+0.35);
      keeperRoot.rotation.set(0,0,0);
      applySpriteFrame(keeperTex,0,CFG.keeperFrameCount);
      if(shots>=TOTAL) setTimeout(showFinal,80);
      else{ canShoot=true; document.getElementById('banner').style.display=''; }
    }
  } else {
    // Idle: sol-sağ sallantı — kaleci hazır ve tetikte görünür
    const swayX=Math.sin(ts*0.0018)*0.14;
    const swayY=KEEPER_WorldH/2+Math.abs(Math.sin(ts*0.0018))*0.03;
    keeperRoot.position.x=swayX;
    keeperRoot.position.y=swayY;
    keeperRoot.rotation.z=swayX*-0.12; // hafif vücut eğimi
    applySpriteFrame(keeperTex,0,CFG.keeperFrameCount);
  }

  billboardSprite(playerRoot);
  billboardSprite(keeperRoot);

  renderer.render(scene,camera);
  drawFx();
  requestAnimationFrame(loop);
}

/**
 * @param {string} url
 * @param {string} label konsol log icin
 * @param {{sheet?:boolean}} opt sheet=false → sadece SRGB (or. tek kare ball.png)
 */
function loadTextureAsset(url,label,opt={}){
  const useSheet=opt.sheet!==false;
  return new Promise((resolve,reject)=>{
    textureLoader.load(
      url,
      (tex)=>{
        try{
          if(useSheet) prepareSheetTexture(tex);
          else{
            tex.colorSpace=THREE.SRGBColorSpace;
            tex.needsUpdate=true;
          }
          resolve(tex);
        }catch(e){
          console.error('[TextureLoader] prepareSheet/hazirlik hatasi',label,url,e);
          reject(e);
        }
      },
      undefined,
      (evt)=>{
        console.error('[TextureLoader] yukleme basarisiz',label,url,evt);
        reject(new Error(typeof evt?.message==='string'?evt.message:('Yuklenemedi: '+label)));
      }
    );
  });
}

function addBackgroundIfNeeded(bgT){
  if(bgMesh) return;
  /**
   * Kamera: (0, 0.85, 5.5) → bakış (0, 1.5, -11), FOV=38°
   * bg plane: z=-19 (kameradan 24.5 birim uzakta)
   *
   * z=-19'da kamera bakış y'si:
   *   yön = normalize(0, 0.65, -16.5) → dy_norm ≈ 0.0394
   *   y_look = 0.85 + 0.0394 * 24.5 ≈ 1.81 m
   *
   * Görüş yüksekliği z=-19'da:
   *   2 * 24.5 * tan(19°) ≈ 16.88 m
   *
   * bg.png (1536×1024, 3:2) → bgH=24, bgW=36 (oran korunuyor)
   *   dikey kaplama: 24/16.88 = 1.42× ✓
   *
   * bg.png'de kale yaklaşık alttan %40:
   *   bg bottom = bgCenterY - 12 = 4.2 - 12 = -7.8
   *   %40 noktası = -7.8 + 0.4*24 = 1.8 ≈ y_look ✓
   *
   * Portrait (9:16) için bgW=36 tam ortayı gösterir — sorun yok.
   */
  const bgH=24, bgW=36;       // 36/24=1.5 → bg.png 3:2 oran
  const bgZ=-19;
  const bgCenterY=4.2;        // kamera bakışını kale bandına hizalar
  bgMesh=new THREE.Mesh(
    new THREE.PlaneGeometry(bgW,bgH),
    new THREE.MeshBasicMaterial({map:bgT,depthWrite:false,depthTest:false})
  );
  bgMesh.position.set(0,bgCenterY,bgZ);
  bgMesh.renderOrder=-500;
  scene.add(bgMesh);
}

async function boot(){
  console.log('[assets] CFG.ASSETS',CFG.ASSETS);
  try{
    const [ballT,pT,kT]=await Promise.all([
      loadTextureAsset(CFG.ASSETS.ball,'ball',{sheet:false}),
      loadTextureAsset(CFG.ASSETS.player,'player',{sheet:true}),
      loadTextureAsset(CFG.ASSETS.keeper,'keeper',{sheet:true}),
    ]);
    console.log('[assets] ball, player, keeper textures OK');

    // roughness↓ → top daha parlak ve net görünür
    const ballMat=new THREE.MeshStandardMaterial({map:ballT,roughness:0.35,metalness:0.05,envMapIntensity:0.5});
    ballMesh=new THREE.Mesh(new THREE.SphereGeometry(BALL_R,32,32),ballMat);
    ballMesh.castShadow=true;
    ballMesh.position.set(0,BALL_R,0);
    scene.add(ballMesh);

    playerTex=pT.clone();
    prepareSheetTexture(playerTex);
    playerTex.userData={framePxW:CFG.playerFrameWidth}; // UV inset için
    applySpriteFrame(playerTex,0,CFG.playerFrameCount);
    playerMat=new THREE.MeshBasicMaterial({map:playerTex,transparent:true,depthWrite:false,side:THREE.DoubleSide});
    const playerPlane=new THREE.Mesh(new THREE.PlaneGeometry(PLAYER_WorldW,PLAYER_WorldH),playerMat);
    playerPlane.position.y=PLAYER_WorldH/2;
    playerRoot=new THREE.Group();
    playerRoot.add(playerPlane);
    playerRoot.position.set(0,0,0.55);
    playerRoot.renderOrder=10;
    scene.add(playerRoot);

    keeperTex=kT.clone();
    prepareSheetTexture(keeperTex);
    keeperTex.userData={framePxW:CFG.keeperFrameWidth}; // UV inset için
    applySpriteFrame(keeperTex,0,CFG.keeperFrameCount);
    keeperMat=new THREE.MeshBasicMaterial({map:keeperTex,transparent:true,depthWrite:false,side:THREE.DoubleSide});
    const keeperPlane=new THREE.Mesh(new THREE.PlaneGeometry(KEEPER_WorldW,KEEPER_WorldH),keeperMat);
    keeperPlane.position.y=0;
    keeperRoot=new THREE.Group();
    keeperRoot.add(keeperPlane);
    keeperRoot.position.set(0,KEEPER_WorldH/2,GZ+0.35);
    keeperRoot.renderOrder=8;
    scene.add(keeperRoot);

    assetsReady=true;
    console.log('[assets] assetsReady=true (player, keeper, ball sahneye eklendi)');
    size();
    buildDots();
    resetPositions();

    try{
      const bgT=await loadTextureAsset(CFG.ASSETS.bg,'bg',{sheet:false});
      addBackgroundIfNeeded(bgT);
      console.log('[assets] bg OK');
    }catch(bgErr){
      console.error('[assets] bg yuklenemedi (oyun devam eder)',bgErr);
    }
  }catch(err){
    console.error('[boot] cekirdek asset (ball/player/keeper) yuklemesi basarisiz',err);
    const msg='assets/ball.png, assets/arda.png, assets/keeper.png gerekli. index.html ile ayni kok. Hata: '+String(err?.message||err);
    const d=document.createElement('div');
    d.style.cssText='position:fixed;bottom:12px;left:12px;right:12px;max-width:520px;margin:auto;background:#1a1a1a;color:#ffb74d;padding:12px 16px;border-radius:10px;font:14px/1.4 sans-serif;z-index:9999;border:1px solid #444';
    d.textContent=msg;
    document.body.appendChild(d);
  }
}

size();
buildDots();
requestAnimationFrame(loop);
boot();
</script>
