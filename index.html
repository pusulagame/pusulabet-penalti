@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#1a4a20;overflow:hidden;height:100dvh;width:100vw;font-family:'Rajdhani',sans-serif;touch-action:manipulation;user-select:none;}

@keyframes pulse{0%,100%{transform:translateX(-50%) scale(1)}50%{transform:translateX(-50%) scale(1.04)}}
#result{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;opacity:0;pointer-events:none;transition:opacity .3s;}

.rtxt{font-family:'Bebas Neue',cursive;font-size:clamp(40px,10vw,64px);letter-spacing:5px;position:relative;z-index:1;text-shadow:0 4px 24px rgba(0,0,0,.9);}

.rsub{font-size:18px;color:rgba(255,255,255,.82);position:relative;z-index:1;letter-spacing:1px;}

#final.show{display:flex;}
.fbg{position:absolute;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(12px);}
.fcard{position:relative;z-index:1;background:linear-gradient(145deg,rgba(255,107,0,.1),rgba(0,0,0,.7));border:1px solid rgba(255,215,0,.28);border-radius:24px;padding:32px 40px;text-align:center;max-width:320px;width:88%;}

#start{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:48px;}

.stitle span{color:#FFD700;}
.sdesc{font-size:15px;color:rgba(255,255,255,.65);margin-bottom:22px;line-height:1.5;}
.srules{display:flex;justify-content:center;gap:28px;margin-bottom:24px;}
.ri{text-align:center;}.ric{font-size:26px;}.rit{font-size:12px;color:rgba(255,255,255,.48);display:block;margin-top:3px;}

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}

<script type="module">
import * as THREE from 'three';
import { FBXLoader } from 'three/addons/loaders/FBXLoader.js';

// ── ASSET YOLLARI ──
const BASE = new URL('assets/', new URL('.', import.meta.url)).href;
const ASSET = (p)=>new URL(p, BASE).href;

// ── SABITLER ──
const TOTAL=5, BALL_R=0.11;
// Gercek olculer: kale 7.32m x 2.44m, penalti 11m
const GW=7.32, GH=2.44, GZ=-11;
// Kale secim grid'i: kale agzi alt cizgisi (y=0'a daha yakin olmali). Yukarida kalmasin diye asagi cekildi.
const GOAL_YOF=0.22;
// FBX Mixamo modelleri genellikle 100x buyuk gelir (cm cinsinden)
// normalizeChar ile hedef boya scale edilir
// Arda oncekine gore ~%30 kucuk
const ARDA_TARGET_H   = 1.28;  // metre
// Kaleci kale icinde gorunur ve daha gercekci
const KEEPER_TARGET_H = 1.78;  // metre

const GMSG=["Net kose! 🔥","Tam isabet! ✨","Harika sut! 💥","Ust kose! 🎯","Gecilmez! ⚡"];
const MMSG=["Kaleci tuttu! 🧤","Az kaldi! 😅","Direkce carpti!","Kacti! 😬","Kaleci sezdi! 👀"];
const CC=['#FFD700','#FF6B00','#00E676','#FF1744','#00BCD4','#E91E63','#fff'];

// ── TELEGRAM ──
let tg=null;
try{tg=window.Telegram?.WebApp;if(tg){tg.ready();tg.expand();}}catch(e){}

// ── THREE.JS ──
const canvas=document.getElementById('c');
const fx=document.getElementById('fx');
const fctx=fx.getContext('2d');
let W=innerWidth,H=innerHeight;

const scene=new THREE.Scene();
const cam=new THREE.PerspectiveCamera(42,W/H,0.1,220);
// Kompozisyon: Arda alt-orta, kale + kaleci net, mobil dikeyde dengeli
cam.position.set(0,1.55,8.2);
cam.lookAt(0,1.25,-8.6);

const rdr=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true,powerPreference:'high-performance'});
rdr.setPixelRatio(Math.min(devicePixelRatio,1.5));
rdr.outputColorSpace=THREE.SRGBColorSpace;
rdr.toneMapping=THREE.ACESFilmicToneMapping;
rdr.toneMappingExposure=1.05;
rdr.autoClear=false;

// ── BACKGROUND (ayri scene: full-screen cover) ──
const bgScene=new THREE.Scene();
const bgCam=new THREE.OrthographicCamera(-1,1,1,-1,0,1);
const bgPlane=new THREE.Mesh(
  new THREE.PlaneGeometry(2,2),
  new THREE.MeshBasicMaterial({depthTest:false,depthWrite:false})
);
bgPlane.frustumCulled=false;
bgPlane.renderOrder=-1000;
bgScene.add(bgPlane);
let bgTex=null;
function updateBgCover(){
  if(!bgTex||!bgTex.image) return;
  const iw=bgTex.image.width||1536;
  const ih=bgTex.image.height||1024;
  const imgAspect=iw/ih;
  const viewAspect=W/H;
  // cover: ekranı doldur, taşanı kırp
  if(viewAspect>imgAspect){
    const scale=viewAspect/imgAspect;
    bgTex.repeat.set(1,1/scale);
    bgTex.offset.set(0,(1-bgTex.repeat.y)/2);
  }else{
    const scale=imgAspect/viewAspect;
    bgTex.repeat.set(1/scale,1);
    bgTex.offset.set((1-bgTex.repeat.x)/2,0);
  }
  bgTex.needsUpdate=true;
}

function resize(){
  W=innerWidth;H=innerHeight;
  canvas.width=W;canvas.height=H;
  fx.width=W;fx.height=H;
  rdr.setSize(W,H,false);
  cam.aspect=W/H;
  cam.fov=H>W?58:42;
  cam.updateProjectionMatrix();
  updateBgCover();
}
resize();
addEventListener('resize',resize);

// Isiklar
scene.add(new THREE.AmbientLight(0xffffff,0.8));
const sun=new THREE.DirectionalLight(0xfff5e6,1.0);
sun.position.set(-8,22,12);
scene.add(sun);
const fill=new THREE.DirectionalLight(0xaaccff,0.25);
fill.position.set(10,8,-5);
scene.add(fill);

// Zemin
const gnd=new THREE.Mesh(
  new THREE.PlaneGeometry(120,120),
  new THREE.MeshStandardMaterial({transparent:true,opacity:0,depthWrite:false})
);
gnd.rotation.x=-Math.PI/2;
scene.add(gnd);

// Penalti noktasi
const wm=new THREE.MeshBasicMaterial({color:0xffffff});
const sp=new THREE.Mesh(new THREE.CircleGeometry(0.22,32),wm);
sp.rotation.x=-Math.PI/2;sp.position.set(0,0.02,0);scene.add(sp);
const ln=new THREE.Mesh(new THREE.PlaneGeometry(9.15,0.12),wm);
ln.rotation.x=-Math.PI/2;ln.position.set(0,0.02,-5.5);scene.add(ln);

// Kale plane (raycast)
const goalPlane=new THREE.Plane(new THREE.Vector3(0,0,1),-GZ);
const rc=new THREE.Raycaster();
const ndc=new THREE.Vector2();
const hit=new THREE.Vector3();

// Highlight meshler
const hiG=new THREE.Group();scene.add(hiG);
(()=>{
  const cw=GW/3,ch=GH/3;
  for(let r=0;r<3;r++) for(let c=0;c<3;c++){
    const m=new THREE.Mesh(
      new THREE.PlaneGeometry(cw-0.12,ch-0.12),
      new THREE.MeshBasicMaterial({color:0xffd700,transparent:true,opacity:0,depthWrite:false})
    );
    m.position.set(-GW/2+cw*(c+0.5),GOAL_YOF+ch*(2-r)+ch/2,GZ+0.04);
    m.userData={r,c};
    hiG.add(m);
  }
})();

function setHi(r,c,op){
  hiG.children.forEach(m=>{m.material.opacity=(r>=0&&m.userData.r===r&&m.userData.c===c)?op:0;});
}

function worldCell(row,col){
  const cw=GW/3,ch=GH/3;
  return new THREE.Vector3(-GW/2+cw*(col+0.5),GOAL_YOF+ch*((2-row)+0.5),GZ+0.02);
}

// ── FBX YUKLEME ──
const fbxLoader=new FBXLoader();

function loadFBX(url){
  return new Promise(resolve=>{
    fbxLoader.load(url,obj=>resolve(obj),undefined,err=>{
      console.error('[FBX] Yuklenemedi:',url,err?.message||err);
      resolve(null);
    });
  });
}

// FBX modelini normalize et: hedef yukseklige scale, ayaklari y=0'a getir
function normalizeChar(obj, targetH){
  // FBX Mixamo modelleri cm cinsinden gelir (100x buyuk)
  // Once bbox olc, sonra scale ayarla
  obj.updateMatrixWorld(true);
  const box=new THREE.Box3().setFromObject(obj);
  const sz=new THREE.Vector3();
  box.getSize(sz);
  if(sz.y<0.001){console.warn('normalizeChar: sifir yukseklik');return;}
  const s=targetH/sz.y;
  obj.scale.setScalar(s);
  obj.updateMatrixWorld(true);
  // Ayaklari y=0'a getir
  const b2=new THREE.Box3().setFromObject(obj);
  obj.position.y-=b2.min.y;
}

// ── KARAKTER YAPISI ──
// Her FBX dosyasi kendi model+mixer+action ikilisiyle calisir
// Animasyon gecisi: onceki model gizlenir, yeni model gosterilir

let arda=null;   // {models:{idle,kick}, mixers:{idle,kick}, actions:{idle,kick}, current}
let keeper=null; // {models:{idle,dive_left,...}, mixers:{...}, actions:{...}, current}
let goalObj=null; // goal.fbx
let ballObj=null; // ball.fbx (opsiyonel)

function playAnim(ch, name){
  if(!ch || !ch.actions[name]) return;
  if(ch.current===name) return;

  // Onceki modeli gizle
  const prev=ch.models[ch.current];
  if(prev) prev.visible=false;

  // Onceki action'i durdur
  const prevAct=ch.actions[ch.current];
  if(prevAct) prevAct.stop();

  // Yeni modeli goster
  const next=ch.models[name];
  if(next) next.visible=true;

  // Yeni action'i baslat
  ch.current=name;
  ch.actions[name].reset().setEffectiveWeight(1).setEffectiveTimeScale(1).play();
}

function tickChar(ch, dt){
  if(!ch) return;
  Object.values(ch.mixers).forEach(mx=>mx.update(dt));
}

// ── OYUN DURUMU ──
let ballMesh=null;
let goals=0,misses=0,shots=0,gameActive=false,canShoot=true,ready=false;
let hoverCell={r:-1,c:-1};
let parts=[],confs=[];
let ballAnim={on:false,t:0,dur:0.55,p0:null,p1:null,p2:null};
let kAnim={phase:'idle',t:0,sx:0,tx:0};

function easeOut(t){return 1-Math.pow(1-t,3);}
function easeIO(t){return t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}

// ── HOVER & SHOOT ──
function hover(cx,cy){
  if(!gameActive||!canShoot){setHi(-1,-1,0);return;}
  ndc.x=(cx/W)*2-1;ndc.y=-(cy/H)*2+1;
  rc.setFromCamera(ndc,cam);
  if(!rc.ray.intersectPlane(goalPlane,hit)){setHi(-1,-1,0);hoverCell={r:-1,c:-1};return;}
  if(hit.x<-GW/2||hit.x>GW/2||hit.y<GOAL_YOF||hit.y>GOAL_YOF+GH){
    setHi(-1,-1,0);hoverCell={r:-1,c:-1};return;
  }
  const cw=GW/3,ch=GH/3;
  const col=Math.min(2,Math.max(0,Math.floor((hit.x+GW/2)/cw)));
  const row=2-Math.min(2,Math.max(0,Math.floor((hit.y-GOAL_YOF)/ch)));
  hoverCell={r:row,c:col};setHi(row,col,0.28);
}

function pickKAnim(side,row){
  if(side==='center') return Math.random()<0.5?'sidestep_left':'sidestep_right';
  if(row===2) return side==='left'?'save_low_left':'save_low_right';
  return side==='left'?'dive_left':'dive_right';
}

function shoot(row,col){
  if(!ready||!canShoot||!gameActive) return;
  canShoot=false;
  document.getElementById('banner').style.display='none';
  setHi(-1,-1,0);

  const target=worldCell(row,col);
  const rand=Math.random();
  let side;
  if(col===0)      side=rand<0.5?'left':(rand<0.75?'center':'right');
  else if(col===2) side=rand<0.5?'right':(rand<0.75?'center':'left');
  else             side=rand<0.33?'left':(rand<0.66?'center':'right');

  const cm={0:'left',1:'center',2:'right'};
  let saved=false;
  if(side===cm[col]){
    // Kaleci dogru tarafi sezdi: kurtaris ihtimali yuksek
    if(row===0&&col!==1) saved=Math.random()<0.45; // ust kose
    else if(row===0)     saved=Math.random()<0.55; // ust orta
    else                 saved=Math.random()<0.75; // alt/orta
  } else {
    // Yanlis tarafa gitti ama bazen reaksiyon/temas olur
    saved=Math.random()<0.15;
  }

  // Kaleci
  if(keeper){
    const sideX={left:-GW*0.28,center:0,right:GW*0.28};
    kAnim={phase:'dive',t:0,sx:keeper.root.position.x,tx:sideX[side]};
    playAnim(keeper, pickKAnim(side,row));
  }

  // Arda kick
  playAnim(arda,'kick');

  // Top
  const p0=ballMesh.position.clone();
  const p2=target.clone();
  const p1=new THREE.Vector3().addVectors(p0,p2).multiplyScalar(0.5);
  p1.y+=2.0+Math.random()*0.4;
  ballAnim={on:true,t:0,dur:0.55,p0,p1,p2};

  setTimeout(()=>land(saved,target),560);
}

function land(saved,wt){
  shots++;
  const dot=document.getElementById('dot-'+(shots-1));
  const wv=wt.clone().project(cam);
  const px=(wv.x*0.5+0.5)*W, py=(-wv.y*0.5+0.5)*H;
  if(!saved){
    goals++;document.getElementById('sGoal').textContent=goals;
    if(dot)dot.classList.add('goal');
    spawnP(px,py);spawnC(px,py-H*0.06);
    showRes(true);
  }else{
    misses++;document.getElementById('sMiss').textContent=misses;
    if(dot)dot.classList.add('miss');
    showRes(false);
  }
  document.getElementById('sRemain').textContent=TOTAL-shots;
}

function showRes(ok){
  const ov=document.getElementById('result');
  document.getElementById('rEmoji').textContent=ok?'⚽':'🧤';
  const rt=document.getElementById('rTxt');
  rt.textContent=ok?'GOL!':'TUTUDU!';
  rt.className='rtxt '+(ok?'gt':'mt');
  document.getElementById('rSub').textContent=(ok?GMSG:MMSG)[Math.floor(Math.random()*(ok?GMSG:MMSG).length)];
  ov.classList.add('show');
  setTimeout(()=>{
    ov.classList.remove('show');
    if(ballMesh){ballMesh.position.set(0,BALL_R,0);ballAnim.on=false;}
    playAnim(arda,'idle');
    if(keeper){
      kAnim={phase:'return',t:0,sx:keeper.root.position.x,tx:0};
      playAnim(keeper,'idle');
    }
    if(shots>=TOTAL) setTimeout(showFinal,450);
    else{canShoot=true;document.getElementById('banner').style.display='';}
  },1600);
}

function showFinal(){
  const pct=goals/TOTAL;
  const t=document.getElementById('fTrophy'),ti=document.getElementById('fTitle'),m=document.getElementById('fMsg');
  document.getElementById('fScore').textContent=goals+'/'+TOTAL+' GOL';
  if(pct===1)      {t.textContent='🏆';ti.textContent='MUKEMMEL!';ti.style.color='#FFD700';m.textContent='Tum penaltilari gol yaptin!';}
  else if(pct>=0.8){t.textContent='🥇';ti.textContent='HARIKA!';  ti.style.color='#FFD700';m.textContent='Cok iyi!';}
  else if(pct>=0.6){t.textContent='⭐';ti.textContent='IYI!';    ti.style.color='#4FC3F7';m.textContent='Guzel oyun!';}
  else if(pct>=0.4){t.textContent='💪';ti.textContent='DEVAM ET!';ti.style.color='#FF9800';m.textContent='Rovans ver!';}
  else             {t.textContent='😅';ti.textContent='OLMADI!'; ti.style.color='#FF5252';m.textContent='Bu sefer kaleci kazandi!';}
  document.getElementById('final').classList.add('show');
  gameActive=false;
  spawnC(W/2,H*0.35);
  if(tg){try{tg.sendData(JSON.stringify({game:'penalti',goals,misses,total:TOTAL}));}catch(e){}}
}

function resetGame(){
  goals=0;misses=0;shots=0;canShoot=true;gameActive=true;
  document.getElementById('sGoal').textContent='0';
  document.getElementById('sMiss').textContent='0';
  document.getElementById('sRemain').textContent=TOTAL;
  document.getElementById('final').classList.remove('show');
  document.getElementById('banner').style.display='';
  parts=[];confs=[];buildDots();
  if(ballMesh){ballMesh.position.set(0,BALL_R,0);ballAnim.on=false;}
  playAnim(arda,'idle');
  if(keeper){
    keeper.root.position.set(0,0,GZ+0.55);
    kAnim={phase:'idle',t:0,sx:0,tx:0};
    playAnim(keeper,'idle');
  }
}
window.resetGame=resetGame;

// ── PARTIKUL ──
function spawnP(cx,cy){for(let i=0;i<32;i++){const a=Math.random()*Math.PI*2,s=1.5+Math.random()*5;parts.push({x:cx,y:cy,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:1,decay:0.02+Math.random()*0.02,r:2+Math.random()*5,col:Math.random()<0.5?'#00E676':'#FFD700'});}}
function spawnC(cx,cy){for(let i=0;i<70;i++){const a=(Math.random()-0.5)*Math.PI*1.5-Math.PI/2,s=4+Math.random()*11;confs.push({x:cx,y:cy,vx:Math.cos(a)*s+(Math.random()-0.5)*4,vy:Math.sin(a)*s,w:4+Math.random()*8,h:3+Math.random()*5,rot:Math.random()*Math.PI*2,rotV:(Math.random()-0.5)*0.35,life:1,decay:0.008+Math.random()*0.008,col:CC[Math.floor(Math.random()*CC.length)]});}}
function drawFx(){
  fctx.clearRect(0,0,W,H);
  for(let i=parts.length-1;i>=0;i--){const p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.18;p.life-=p.decay;if(p.life<=0){parts.splice(i,1);continue;}fctx.globalAlpha=p.life;fctx.fillStyle=p.col;fctx.beginPath();fctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);fctx.fill();}
  for(let i=confs.length-1;i>=0;i--){const c=confs[i];c.x+=c.vx;c.y+=c.vy;c.vy+=0.28;c.vx*=0.99;c.rot+=c.rotV;c.life-=c.decay;if(c.life<=0){confs.splice(i,1);continue;}fctx.save();fctx.globalAlpha=c.life;fctx.translate(c.x,c.y);fctx.rotate(c.rot);fctx.fillStyle=c.col;fctx.fillRect(-c.w/2,-c.h/2,c.w,c.h);fctx.restore();}
  fctx.globalAlpha=1;
}

// ── INPUT ──
function buildDots(){const cont=document.getElementById('dots');cont.innerHTML='';for(let i=0;i<TOTAL;i++){const d=document.createElement('div');d.className='dot';d.id='dot-'+i;cont.appendChild(d);}}
canvas.addEventListener('mousemove',e=>{if(gameActive&&canShoot)hover(e.clientX,e.clientY);});
canvas.addEventListener('click',e=>{if(!gameActive||!canShoot)return;hover(e.clientX,e.clientY);if(hoverCell.r>=0)shoot(hoverCell.r,hoverCell.c);});
canvas.addEventListener('touchstart',e=>{if(!gameActive||!canShoot)return;const t=e.touches[0];hover(t.clientX,t.clientY);if(hoverCell.r>=0){e.preventDefault();shoot(hoverCell.r,hoverCell.c);}},{passive:false});
canvas.addEventListener('touchmove',e=>{if(gameActive&&canShoot)hover(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});

// ── ANA DONGU ──
let lastT=0;
function loop(ts){
  const dt=Math.min((ts-lastT)/1000,0.05);lastT=ts;

  rdr.clear();
  rdr.render(bgScene,bgCam);
  rdr.clearDepth();

  tickChar(arda,dt);
  tickChar(keeper,dt);

  if(ballAnim.on&&ballMesh){
    ballAnim.t+=dt;
    const u=Math.min(ballAnim.t/ballAnim.dur,1),e=easeIO(u);
    const{p0,p1,p2}=ballAnim;
    ballMesh.position.x=(1-e)*(1-e)*p0.x+2*(1-e)*e*p1.x+e*e*p2.x;
    ballMesh.position.y=(1-e)*(1-e)*p0.y+2*(1-e)*e*p1.y+e*e*p2.y;
    ballMesh.position.z=(1-e)*(1-e)*p0.z+2*(1-e)*e*p1.z+e*e*p2.z;
    ballMesh.rotation.x+=14*dt;ballMesh.rotation.z+=10*dt;
    if(u>=1)ballAnim.on=false;
  }

  if(keeper){
    if(kAnim.phase==='dive'){
      kAnim.t+=dt;
      const u=Math.min(kAnim.t/0.42,1),e=easeOut(u);
      keeper.root.position.x=kAnim.sx+(kAnim.tx-kAnim.sx)*e;
      keeper.root.position.y=Math.sin(u*Math.PI)*0.15;
      if(u>=1)kAnim.phase='hold';
    }else if(kAnim.phase==='hold'){
      // Pozisyonu sabitle (idle bob'a dusup ziplama/floating yapmasin)
      keeper.root.position.y=0;
    }else if(kAnim.phase==='return'){
      kAnim.t+=dt;
      const u=Math.min(kAnim.t/0.6,1),e=easeIO(u);
      keeper.root.position.x=kAnim.sx*(1-e);
      keeper.root.position.y=0;
      if(u>=1){kAnim.phase='idle';keeper.root.position.set(0,0,GZ+0.55);}
    }else{
      keeper.root.position.x=Math.sin(ts*0.0014)*0.04;
      keeper.root.position.y=0;
    }
  }

  rdr.render(scene,cam);
  drawFx();
  requestAnimationFrame(loop);
}

// ── BOOT ──
const texLoader=new THREE.TextureLoader();
texLoader.setCrossOrigin('anonymous');

async function boot(){
  console.log('[boot] BASE=',BASE);

  // BG (full-screen cover scene)
  try{
    bgTex=await new Promise((res,rej)=>texLoader.load(ASSET('bg.png'),res,undefined,rej));
    bgTex.colorSpace=THREE.SRGBColorSpace;
    bgTex.wrapS=THREE.ClampToEdgeWrapping;
    bgTex.wrapT=THREE.ClampToEdgeWrapping;
    bgTex.repeat.set(1,1);
    bgTex.offset.set(0,0);
    bgPlane.material.map=bgTex;
    bgPlane.material.needsUpdate=true;
    updateBgCover();
  }catch(e){
    console.error('[BG] Yuklenemedi',e);
  }

  // Top
  try{
    // Yeni yapida top dokulari assets/ball/ altinda
    const bt=await new Promise((res,rej)=>texLoader.load(ASSET('ball/ball_texture.png'),res,undefined,rej));
    bt.colorSpace=THREE.SRGBColorSpace;
    ballMesh=new THREE.Mesh(
      new THREE.SphereGeometry(BALL_R,32,32),
      new THREE.MeshStandardMaterial({map:bt,roughness:0.35,metalness:0.05})
    );
    ballMesh.position.set(0,BALL_R,0.08);
    scene.add(ballMesh);
  }catch(e){console.error('[Ball.png] Yuklenemedi',e);}

  // Opsiyonel: ball.fbx varsa png topun yerine onu kullan
  try{
    const bfbx=await loadFBX(ASSET('ball/ball_texture.fbx'));
    if(bfbx){
      bfbx.traverse(o=>{ if(o.isMesh){ o.castShadow=true; o.receiveShadow=false; }});
      bfbx.updateMatrixWorld(true);
      const box=new THREE.Box3().setFromObject(bfbx);
      const sz=new THREE.Vector3(); box.getSize(sz);
      const maxD=Math.max(sz.x,sz.y,sz.z);
      if(maxD>0.0001){
        const s=(BALL_R*2)/maxD;
        bfbx.scale.setScalar(s);
      }
      bfbx.position.set(0,BALL_R,0.08);
      scene.add(bfbx);
      ballObj=bfbx;
      // Animasyon kodu ballMesh uzerinden calisiyor; FBX geldiyse onu aktif top yap
      if(ballMesh) scene.remove(ballMesh);
      ballMesh=bfbx;
      console.log('[Ball.fbx] yüklendi');
    }
  }catch(e){
    console.warn('[Ball.fbx] Yok/hatali (opsiyonel)',e?.message||e);
  }

  // ── ARDA FBX ──
  const [ardaIdle, ardaKick] = await Promise.all([
    loadFBX(ASSET('arda/idle.fbx')),
    loadFBX(ASSET('arda/kick.fbx')),
  ]);

  if(ardaIdle||ardaKick){
    const root=new THREE.Group();
    root.rotation.y=Math.PI; // kameraya arkasiyla
    root.renderOrder=10;
    scene.add(root);
    arda={root, models:{}, mixers:{}, actions:{}, current:''};

    // Idle modeli
    if(ardaIdle){
      normalizeChar(ardaIdle, ARDA_TARGET_H);
      ardaIdle.visible=true;
      root.add(ardaIdle);
      const mx=new THREE.AnimationMixer(ardaIdle);
      const clip=ardaIdle.animations[0];
      if(clip){
        const act=mx.clipAction(clip);
        act.setLoop(THREE.LoopRepeat,Infinity);
        act.play();
        arda.models.idle=ardaIdle;
        arda.mixers.idle=mx;
        arda.actions.idle=act;
      }
    }

    // Kick modeli
    if(ardaKick){
      normalizeChar(ardaKick, ARDA_TARGET_H);
      ardaKick.visible=false;
      root.add(ardaKick);
      const mx=new THREE.AnimationMixer(ardaKick);
      const clip=ardaKick.animations[0];
      if(clip){
        const act=mx.clipAction(clip);
        act.setLoop(THREE.LoopOnce,1);
        act.clampWhenFinished=true;
        arda.models.kick=ardaKick;
        arda.mixers.kick=mx;
        arda.actions.kick=act;
      }
    }

    arda.current='idle';

    // Arda pozisyonu — penalti noktasi onunde
    root.position.set(0.15,0,1.45);
    console.log('[Arda] hazir, actions:',Object.keys(arda.actions));
  }

  // ── KALECI FBX ──
  const keeperFiles=[
    ['idle',          ASSET('keeper/idle.fbx'),           THREE.LoopRepeat],
    ['dive_left',     ASSET('keeper/dive_left.fbx'),      THREE.LoopOnce],
    ['dive_right',    ASSET('keeper/dive_right.fbx'),     THREE.LoopOnce],
    ['save_low_left', ASSET('keeper/save_low_left.fbx'),  THREE.LoopOnce],
    ['save_low_right',ASSET('keeper/save_low_right.fbx'), THREE.LoopOnce],
    ['sidestep_left', ASSET('keeper/sidestep_left.fbx'),  THREE.LoopOnce],
    ['sidestep_right',ASSET('keeper/sidestep_right.fbx'), THREE.LoopOnce],
  ];

  const kRoot=new THREE.Group();
  kRoot.position.set(0,0,GZ+0.55);
  kRoot.rotation.y=0;
  kRoot.renderOrder=8;
  scene.add(kRoot);
  keeper={root:kRoot, models:{}, mixers:{}, actions:{}, current:''};

  // Paralel yukle
  const kLoaded=await Promise.all(keeperFiles.map(([,url])=>loadFBX(url)));

  kLoaded.forEach((fbx,i)=>{
    if(!fbx)return;
    const[name,,loop]=keeperFiles[i];
    normalizeChar(fbx, KEEPER_TARGET_H);
    fbx.visible=(name==='idle'); // sadece idle baslangicta gorunur
    kRoot.add(fbx);
    const mx=new THREE.AnimationMixer(fbx);
    const clip=fbx.animations[0];
    if(clip){
      const act=mx.clipAction(clip);
      act.setLoop(loop,loop===THREE.LoopOnce?1:Infinity);
      if(loop===THREE.LoopOnce) act.clampWhenFinished=true;
      if(name==='idle') act.play();
      keeper.models[name]=fbx;
      keeper.mixers[name]=mx;
      keeper.actions[name]=act;
    }
  });

  keeper.current='idle';
  console.log('[Keeper] hazir, actions:',Object.keys(keeper.actions));

  // GOAL FBX (opsiyonel)
  try{
    // Yeni yapida kale modeli assets/goal/ altinda
    const gfbx=await loadFBX(ASSET('goal/goal_texture.fbx'));
    if(gfbx){
      gfbx.traverse(o=>{ if(o.isMesh){ o.castShadow=false; o.receiveShadow=false; }});
      gfbx.updateMatrixWorld(true);
      const box=new THREE.Box3().setFromObject(gfbx);
      const sz=new THREE.Vector3(); box.getSize(sz);
      if(sz.x>0.0001 && sz.y>0.0001){
        const sx=GW/sz.x;
        const sy=GH/sz.y;
        const s=Math.min(sx,sy);
        gfbx.scale.setScalar(s);
      }
      gfbx.position.set(0,GOAL_YOF,GZ);
      gfbx.renderOrder=2;
      scene.add(gfbx);
      goalObj=gfbx;
      console.log('[Goal.fbx] yüklendi');
    }
  }catch(e){
    console.warn('[Goal.fbx] Yok/hatali (opsiyonel)',e?.message||e);
  }

  ready=true;
  buildDots();
  console.log('[boot] Hazir!');
}

buildDots();
requestAnimationFrame(loop);
boot();
</script>
